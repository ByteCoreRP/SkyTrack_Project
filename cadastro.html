<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Drone</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- icon da pagina -->
    <link
      rel="icon"
      type="image/x-icon"
      href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRArHRQlKS6To2_41tWeGjSX8gB-A3QEX8Xwg&s"
    />
    <link rel="stylesheet" href="./assets/CSS/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <style>
    body {
      background-color: #0f172a;
      color: white;
    }
  </style>

  <body>
    <header class="bg-dark p-3">
      <div class="container d-flex justify-content-between align-items-center">
        <h3>SkyTrack</h3>
        <nav>
          <ul class="nav">
            <li class="nav-item">
              <a href="index.html" class="nav-link text-white">Dashboard</a>
            </li>
            <li class="nav-item">
              <a href="cadastro.html" class="nav-link text-white"
                >Cadastrar Drone</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container my-5">
      <h2>Cadastro de Drone</h2>

      <form>
        <div class="mb-3">
          <label for="nome" class="form-label">Nome do Drone</label>
          <input
            type="text"
            id="nome"
            placeholder="Ex: Drone Alpha"
            class="form-control"
            required
          />
        </div>

        <div class="mb-3">
          <label for="serie" class="form-label">Número de Série</label>
          <input
            type="text"
            id="serie"
            class="form-control"
            minlength="8"
            placeholder="345366"
            required
          />
        </div>

        <div class="mb-3">
          <label for="autonomia" class="form-label">Autonomia (min)</label>
          <input
            type="number"
            id="autonomia"
            class="form-control"
            max="120"
            placeholder="Max 120"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Setor</label>
          <select id="setor" class="form-select" required>
            <option value="">Selecione</option>
            <option>Entrega Rápida</option>
            <option>Inspeção</option>
            <option>Pesado</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Estado</label><br />
          <input type="radio" name="estado" value="Ativo" required /> Ativo
          <input type="radio" name="estado" value="Manutenção" class="ms-3" />
          Manutenção
        </div>

        <div class="mb-3">
          <label for="senha" class="form-label">Senha do Operador</label>
          <input type="password" id="senha" class="form-control" required />
        </div>

        <button type="submit" class="btn btn-success">Cadastrar</button>
      </form>
    </main>
    <button class="btn btn-danger sos-btn">
      <i class="bi bi-chat-heart"></i>
    </button>
    <footer class="bg-dark text-white py-4 mt-5">
      <div
        class="container d-flex flex-wrap justify-content-between align-items-start"
      >
        <!-- Esquerda -->
        <div>
          <p class="mb-1">&copy; 2025 SkyTrack</p>
          <p class="mb-0">Todos os direitos reservados</p>
        </div>

        <address class="mb-0 text-center">
          BrenoMaranhao@skytrack.com<br />
          (16) 4002-8922 <br />
          Ribeirão Preto - SP
        </address>

        <nav>
          <ul class="nav flex-column text-end">
            <li class="nav-item">
              <a href="index.html" class="nav-link text-white p-0">Dashboard</a>
            </li>
            <li class="nav-item">
              <a href="cadastro.html" class="nav-link text-white p-0"
                >Cadastrar Drone</a
              >
            </li>
            <li class="nav-item">
              <a
                href="https://github.com/ByteCoreRP/SkyTrack_Project.git"
                class="nav-link text-white p-0"
              >
                GitHub
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </footer>

    <script>
      const form = document.querySelector("form");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const drone = {
          nome: document.getElementById("nome").value,
          serie: document.getElementById("serie").value,
          autonomia: Number(document.getElementById("autonomia").value),
          setor: document.querySelector("select").value,
          estado: document.querySelector('input[name="estado"]:checked')?.value,
        };

        let drones = JSON.parse(localStorage.getItem("drones")) || [];

        drones.push(drone);

        localStorage.setItem("drones", JSON.stringify(drones));

        mostrarMensagem("Drone cadastrado com sucesso");

        form.reset();

        setTimeout(() => {
          window.location.href = "index.html";
        }, 1500);
      });

      function mostrarMensagem(msg) {
        const alerta = document.createElement("div");
        alerta.className = "alert alert-success mt-3";
        alerta.innerText = msg;

        const form = document.querySelector("form");

        form.parentNode.insertBefore(alerta, form);

        setTimeout(() => {
          alerta.remove();
        }, 3000);
      }
    </script>
  </body>
</html>
