<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyTrack Drones</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #0f172a;
        color: white;
      }

      .status-online {
        background: linear-gradient(45deg, #00ff88, #00cc66);
        color: black;
        padding: 5px 10px;
        border-radius: 5px;
        font-weight: bold;
      }

      .card {
        border-radius: 10px;
        transition: 0.3s;
      }

      .card:hover {
        transform: scale(1.03);
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
      }

      .sos-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 999;
      }

      .truncate {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>

  <body>
    <header class="bg-dark p-3">
      <div class="container d-flex justify-content-between align-items-center">
        <h3>🚁 SkyTrack</h3>
        <nav>
          <ul class="nav">
            <li class="nav-item">
              <a href="index.html" class="nav-link text-white">Dashboard</a>
            </li>
            <li class="nav-item">
              <a href="cadastro.html" class="nav-link text-white"
                >Cadastrar Drone</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container my-4">
      <section class="mb-5">
        <h2>Resumo da Frota</h2>

        <div class="table-responsive">
          <table class="table table-dark table-striped">
            <thead>
              <tr>
                <th>Drone</th>
                <th>Status</th>
                <th>Autonomia</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="truncate">Drone Alpha Ultra Long Name Example</td>
                <td><span class="status-online">Ativo</span></td>
                <td>90 min</td>
              </tr>
              <tr>
                <td>Drone Beta</td>
                <td class="text-warning">Manutenção</td>
                <td>60 min</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
      <button class="btn btn-danger mt-3" onclick="limparDados()">
        Limpar Todos os Drones
      </button>
    </main>
    <button class="btn btn-danger sos-btn">SOS / Ajuda</button>
    <footer class="bg-dark text-center p-3 mt-5">
      <p>&copy; 2026 SkyTrack Logistics</p>
      <address>Contato: suporte@skytrack.com</address>
    </footer>

    <script>
      const tabela = document.querySelector("tbody");

      let drones = JSON.parse(localStorage.getItem("drones")) || [];

      //limpa
      tabela.innerHTML = "";

      if (drones.length === 0) {
        tabela.innerHTML = `
      <tr>
        <td colspan="3" class="text-center text-primary">
          Nenhum drone cadastrado 🚫
        </td>
      </tr>
    `;
      } else {
        drones.forEach((drone) => {
          const statusClass =
            drone.estado === "Ativo" ? "status-online" : "text-warning";

          const linha = `
        <tr>
          <td class="truncate">${drone.nome}</td>
          <td><span class="${statusClass}">${drone.estado}</span></td>
          <td>${drone.autonomia} min</td>
        </tr>
      `;

          tabela.innerHTML += linha;
        });
      }

      function limparDados() {
        if (confirm("Tem certeza?")) {
          localStorage.removeItem("drones");
          location.reload();
        }
      }
    </script>
  </body>
</html>
